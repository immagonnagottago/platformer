<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Integer Physics Platformer</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #000; }
        canvas { 
            image-rendering: pixelated; 
            width: 640px; 
            height: 480px; 
            border: 2px solid #444; 
            background-color: #1a1a1a; 
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="160" height="120"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Integer constants for physics
    // Using larger multipliers lets us simulate sub-pixel movement with integers
    const FIXED_SCALE = 16; 
    const GRAVITY = 2;
    const JUMP_STRENGTH = -32;
    const SPEED = 2;

    const player = {
        x: 40 * FIXED_SCALE,
        y: 40 * FIXED_SCALE,
        width: 8 * FIXED_SCALE,
        height: 8 * FIXED_SCALE,
        vx: 0,
        vy: 0,
        onGround: false
    };

    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    function update() {
        // Horizontal Movement
        if (keys['ArrowLeft']) player.vx = -SPEED * FIXED_SCALE;
        else if (keys['ArrowRight']) player.vx = SPEED * FIXED_SCALE;
        else player.vx = 0;

        // Jump (Z)
        if (keys['KeyZ'] && player.onGround) {
            player.vy = JUMP_STRENGTH * FIXED_SCALE;
            player.onGround = false;
        }

        // Apply Gravity
        player.vy += GRAVITY;

        // Apply Velocity
        player.x += player.vx;
        player.y += player.vy;

        // Floor Collision (Integer boundary)
        const floorY = 100 * FIXED_SCALE;
        if (player.y + player.height > floorY) {
            player.y = floorY - player.height;
            player.vy = 0;
            player.onGround = true;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Floor
        ctx.fillStyle = '#4a3b2a';
        ctx.fillRect(0, 100, canvas.width, 20);

        // Draw Player (Shift back to real screen coordinates)
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(
            Math.floor(player.x / FIXED_SCALE), 
            Math.floor(player.y / FIXED_SCALE), 
            8, 
            8
        );
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
