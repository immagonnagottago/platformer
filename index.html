<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sandbox Base</title>

<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    cursor: none;
  }

  .ui {
    position: fixed;
    top: 12px;
    left: 12px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  button {
    background: #1e1e1e;
    color: white;
    border: 1px solid #555;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 14px;
  }

  button:hover {
    background: #333;
  }

  button.active {
    background: white;
    color: black;
  }
</style>
</head>
<body>

<div class="ui">
  <button id="wallBtn" class="active">Wall</button>
  <button id="eraseBtn">Erase</button>
  <button id="clearBtn">Clear</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const CELL_SIZE = 4;

let cols;
let rows;
let grid;

const EMPTY = 0;
const WALL = 1;

const COLORS = {
  [EMPTY]: "#000000",
  [WALL]: "#ffffff"
};

let mouseDown = false;
let mouseCellX = 0;
let mouseCellY = 0;

let brushSize = 5;

let currentTool = WALL;

/*
============================
GRID
============================
*/

function createGrid() {
  return Array.from({ length: rows }, () =>
    Array(cols).fill(EMPTY)
  );
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  cols = Math.floor(canvas.width / CELL_SIZE);
  rows = Math.floor(canvas.height / CELL_SIZE);

  grid = createGrid();
}

window.addEventListener("resize", resize);
resize();

/*
============================
HELPERS
============================
*/

function inBounds(x, y) {
  return (
    x >= 0 &&
    x < cols &&
    y >= 0 &&
    y < rows
  );
}

function setCell(x, y, type) {
  if (!inBounds(x, y)) return;
  grid[y][x] = type;
}

/*
============================
PAINT
============================
*/

function paint() {
  const half = Math.floor(brushSize / 2);

  for (let dy = -half; dy <= half; dy++) {
    for (let dx = -half; dx <= half; dx++) {

      setCell(
        mouseCellX + dx,
        mouseCellY + dy,
        currentTool
      );

    }
  }
}

/*
============================
UPDATE
============================
*/

function update() {
  if (mouseDown) {
    paint();
  }
}

/*
============================
DRAW
============================
*/

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw cells
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {

      const cell = grid[y][x];

      if (cell !== EMPTY) {

        ctx.fillStyle = COLORS[cell];

        ctx.fillRect(
          x * CELL_SIZE,
          y * CELL_SIZE,
          CELL_SIZE,
          CELL_SIZE
        );
      }
    }
  }

  drawBrushPreview();
}

/*
============================
CURSOR PREVIEW
============================
*/

function drawBrushPreview() {
  const half = Math.floor(brushSize / 2);

  if (currentTool === WALL) {
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
  } else {
    ctx.fillStyle = "rgba(255,0,0,0.25)";
    ctx.strokeStyle = "rgba(255,0,0,0.9)";
  }

  ctx.lineWidth = 1;

  for (let dy = -half; dy <= half; dy++) {
    for (let dx = -half; dx <= half; dx++) {

      const x = mouseCellX + dx;
      const y = mouseCellY + dy;

      if (!inBounds(x, y)) continue;

      ctx.fillRect(
        x * CELL_SIZE,
        y * CELL_SIZE,
        CELL_SIZE,
        CELL_SIZE
      );
    }
  }

  const sizePixels = brushSize * CELL_SIZE;

  const startX =
    (mouseCellX - half) * CELL_SIZE;

  const startY =
    (mouseCellY - half) * CELL_SIZE;

  ctx.strokeRect(
    startX,
    startY,
    sizePixels,
    sizePixels
  );
}

/*
============================
MAIN LOOP
============================
*/

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

/*
============================
MOUSE
============================
*/

function updateMouse(e) {
  const rect = canvas.getBoundingClientRect();

  mouseCellX = Math.floor(
    (e.clientX - rect.left) / CELL_SIZE
  );

  mouseCellY = Math.floor(
    (e.clientY - rect.top) / CELL_SIZE
  );
}

canvas.addEventListener("mousemove", (e) => {
  updateMouse(e);
});

canvas.addEventListener("mousedown", (e) => {
  mouseDown = true;
  updateMouse(e);
  paint();
});

window.addEventListener("mouseup", () => {
  mouseDown = false;
});

/*
============================
BRUSH SIZE
============================
*/

window.addEventListener("wheel", (e) => {
  e.preventDefault();

  if (e.deltaY > 0) {
    brushSize -= 2;
  } else {
    brushSize += 2;
  }

  brushSize = Math.max(1, brushSize);

}, { passive: false });

/*
============================
BUTTONS
============================
*/

const wallBtn = document.getElementById("wallBtn");
const eraseBtn = document.getElementById("eraseBtn");
const clearBtn = document.getElementById("clearBtn");

function setActiveButton(button) {
  wallBtn.classList.remove("active");
  eraseBtn.classList.remove("active");

  button.classList.add("active");
}

wallBtn.addEventListener("click", () => {
  currentTool = WALL;
  setActiveButton(wallBtn);
});

eraseBtn.addEventListener("click", () => {
  currentTool = EMPTY;
  setActiveButton(eraseBtn);
});

clearBtn.addEventListener("click", () => {
  grid = createGrid();
});

/*
============================
KEYS
============================
*/

window.addEventListener("keydown", (e) => {

  if (e.key.toLowerCase() === "c") {
    grid = createGrid();
  }

});
</script>

</body>
</html>
