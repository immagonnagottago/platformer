<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Base</title>
    <style>
        /* Reset margins to ensure true full-screen */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars */
            background-color: #000;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bg-image {
            width: 100%;
            height: 100%;
            /* 'cover' ensures the image fills the area 
               without stretching or distortion */
            object-fit: cover; 
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <img id="bg-image" src="game-background.png" alt="Game Background">
    </div>

</body>
</html>
